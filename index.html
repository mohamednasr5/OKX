<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="OKX Tracker">
<meta name="theme-color" content="#06090f">
<title>OKX Tracker</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;900&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
<style>
/* ════════════════════════════════════════
   ROOT & RESET
════════════════════════════════════════ */
:root {
  --bg:#06090f; --bg2:#0b1119; --card:#0f1b2d; --card2:#132038;
  --border:#182540; --border2:#1e2f4a;
  --accent:#00e5b8; --accent2:#0088ff; --accent3:#7c3aed;
  --profit:#00d68f; --loss:#ff3d5a; --gold:#fbbf24;
  --text:#ddeeff; --text2:#6a8ab0; --text3:#304060;
  --r:14px; --r2:9px;
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bottom:env(safe-area-inset-bottom,0px);
}
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html { height:100%; }
body {
  height:100%; width:100%;
  background:var(--bg); color:var(--text);
  font-family:'Tajawal',sans-serif;
  overflow:hidden; user-select:none;
}

/* ════════════════════════════════════════
   APP SHELL
════════════════════════════════════════ */
#app {
  display:flex; flex-direction:column;
  height:100vh; height:100dvh;
  padding-top:var(--safe-top);
  padding-bottom:var(--safe-bottom);
  position:relative; overflow:hidden;
}
#app::before {
  content:''; position:fixed; inset:0; pointer-events:none; z-index:0;
  background:
    radial-gradient(ellipse 65% 40% at 15% 5%,  rgba(0,229,184,.07) 0%, transparent 60%),
    radial-gradient(ellipse 50% 55% at 85% 92%, rgba(0,136,255,.06) 0%, transparent 60%),
    radial-gradient(ellipse 40% 35% at 55% 50%, rgba(124,58,237,.04) 0%, transparent 60%);
  animation:bgPulse 14s ease-in-out infinite alternate;
}
@keyframes bgPulse { 0%{opacity:.65;transform:scale(1)} 100%{opacity:1;transform:scale(1.05)} }

/* ════════════════════════════════════════
   HEADER
════════════════════════════════════════ */
.header {
  flex-shrink:0; height:52px;
  display:flex; align-items:center; justify-content:space-between;
  padding:0 16px;
  background:rgba(6,9,15,.97);
  border-bottom:1px solid var(--border);
  backdrop-filter:blur(20px);
  position:relative; z-index:50;
}
.header::after {
  content:''; position:absolute; bottom:0; left:0; right:0; height:1px;
  background:linear-gradient(90deg,transparent,var(--accent) 40%,var(--accent2) 60%,transparent);
  opacity:.45;
}
.brand { display:flex; align-items:center; gap:10px; }
.brand-icon {
  width:32px; height:32px; border-radius:8px;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  display:flex; align-items:center; justify-content:center; font-size:16px;
  box-shadow:0 0 16px rgba(0,229,184,.4);
  animation:iconGlow 3s ease-in-out infinite;
}
@keyframes iconGlow {
  0%,100%{ box-shadow:0 0 16px rgba(0,229,184,.4) }
  50%{ box-shadow:0 0 30px rgba(0,229,184,.7), 0 0 50px rgba(0,229,184,.2) }
}
.brand-name { font-size:16px; font-weight:900; letter-spacing:-.3px; }
.brand-name span { background:linear-gradient(135deg,var(--accent),var(--accent2)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
.brand-by { font-size:9px; color:var(--text3); margin-top:1px; }

.header-right { display:flex; align-items:center; gap:6px; }
.live-pill {
  display:flex; align-items:center; gap:4px;
  background:rgba(0,214,143,.08); border:1px solid rgba(0,214,143,.2);
  border-radius:20px; padding:3px 9px; font-size:9px; font-weight:700; color:var(--profit);
}
.pdot {
  width:5px; height:5px; border-radius:50%; background:var(--profit);
  animation:pdot 1.4s infinite;
}
@keyframes pdot { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.2;transform:scale(.5)} }

.h-btn {
  width:30px; height:30px; border-radius:7px;
  background:var(--card); border:1px solid var(--border);
  display:flex; align-items:center; justify-content:center;
  font-size:14px; cursor:pointer; transition:all .2s; color:var(--text2); text-decoration:none;
}
.h-btn:hover { background:var(--card2); border-color:var(--accent); color:var(--accent); transform:translateY(-1px); }
.h-btn.fb { background:rgba(24,119,242,.1); border-color:rgba(24,119,242,.22); color:#1877F2; }
.h-btn.fb:hover { background:rgba(24,119,242,.22); }

/* ════════════════════════════════════════
   TABS
════════════════════════════════════════ */
.tabs {
  flex-shrink:0; height:40px;
  display:flex; background:var(--bg2);
  border-bottom:1px solid var(--border);
  position:relative; z-index:40;
}
.tab {
  flex:1; height:100%; font-size:11px; font-weight:700; color:var(--text3);
  background:none; border:none; border-bottom:2px solid transparent;
  cursor:pointer; font-family:'Tajawal',sans-serif; transition:all .22s;
  display:flex; align-items:center; justify-content:center; gap:4px; position:relative;
}
.tab.active { color:var(--accent); border-bottom-color:var(--accent); background:rgba(0,229,184,.04); }
.tab:hover:not(.active) { color:var(--text2); background:rgba(255,255,255,.02); }
.tab-badge {
  background:var(--loss); color:#fff; border-radius:10px;
  font-size:8px; font-weight:900; padding:1px 5px; margin-right:2px;
}

/* ════════════════════════════════════════
   QUICK PANEL
════════════════════════════════════════ */
.qp-wrap {
  flex-shrink:0; background:rgba(11,17,25,.99);
  border-bottom:1px solid var(--border);
  position:relative; z-index:30;
}
.qp-toggle {
  height:34px; display:flex; align-items:center; justify-content:space-between;
  padding:0 14px; cursor:pointer; user-select:none; transition:background .15s;
}
.qp-toggle:hover { background:rgba(255,255,255,.02); }
.qp-pills { display:flex; align-items:center; gap:10px; }
.qp-pill { display:flex; align-items:center; gap:4px; }
.qp-lbl { font-size:9px; color:var(--text3); font-family:'Tajawal',sans-serif; }
.qp-val { font-weight:700; font-size:11px; font-family:'JetBrains Mono',monospace; }
.qp-val.gold  { color:var(--gold); }
.qp-val.profit{ color:var(--profit); }
.qp-val.loss  { color:var(--loss); }
.qp-sep { width:1px; height:13px; background:var(--border2); }
.qp-chevron { font-size:9px; color:var(--text3); transition:transform .3s cubic-bezier(.34,1.2,.64,1); line-height:1; }
.qp-chevron.open { transform:rotate(180deg); }

.qp-body { overflow:hidden; max-height:0; transition:max-height .32s cubic-bezier(.4,0,.2,1), opacity .25s; opacity:0; }
.qp-body.open { max-height:140px; opacity:1; }
.qp-inner {
  display:grid; grid-template-columns:1fr 1fr; gap:10px;
  padding:10px 14px 12px; border-top:1px solid var(--border);
}
.qp-field { display:flex; flex-direction:column; gap:4px; }
.qp-field-lbl { font-size:9px; font-weight:700; color:var(--text3); text-transform:uppercase; letter-spacing:.5px; }
.qp-iw {
  display:flex; align-items:center;
  background:var(--card); border:1px solid var(--border); border-radius:var(--r2);
  overflow:hidden; transition:border-color .18s;
}
.qp-iw:focus-within { border-color:var(--accent); }
.qp-ico { padding:0 8px; font-size:12px; color:var(--text3); font-weight:700; font-family:'JetBrains Mono',monospace; }
.qp-inp {
  flex:1; min-width:0; background:transparent; border:none; outline:none;
  color:var(--text); font-family:'JetBrains Mono',monospace;
  font-size:13px; padding:7px 4px 7px 0; direction:ltr;
}
.qp-hint { font-size:8px; color:var(--text3); line-height:1.5; }
.qp-hint .hl { font-weight:700; }
.qp-hint .hl.profit { color:var(--profit); }
.qp-hint .hl.gold   { color:var(--gold); }
.qp-save {
  grid-column:1/-1;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  color:#000; border:none; border-radius:var(--r2);
  padding:8px; font-size:12px; font-weight:900; cursor:pointer;
  font-family:'Tajawal',sans-serif; transition:opacity .18s, transform .18s;
}
.qp-save:hover { opacity:.87; transform:translateY(-1px); }
.qp-save:active { transform:translateY(0); }

/* ════════════════════════════════════════
   MAIN SCROLL AREA
════════════════════════════════════════ */
.scroll-area {
  flex:1; min-height:0; overflow-y:auto; overflow-x:hidden;
  -webkit-overflow-scrolling:touch;
  padding:12px 12px 10px;
  display:flex; flex-direction:column; gap:10px;
  position:relative; z-index:10;
}
.scroll-area::-webkit-scrollbar { width:2px; }
.scroll-area::-webkit-scrollbar-thumb { background:var(--border2); border-radius:2px; }

/* ════════════════════════════════════════
   PROFIT BANNER
════════════════════════════════════════ */
.profit-alert-banner {
  display:flex; align-items:center; gap:12px;
  background:linear-gradient(135deg,rgba(0,214,143,.15),rgba(0,229,184,.06));
  border:1px solid rgba(0,214,143,.35); border-radius:var(--r); padding:12px 14px;
  position:relative; overflow:hidden;
  animation:bannerPop .5s cubic-bezier(.34,1.56,.64,1) both;
}
@keyframes bannerPop { from{transform:scale(.9) translateY(-10px);opacity:0} to{transform:scale(1) translateY(0);opacity:1} }
.profit-alert-banner::before {
  content:''; position:absolute; top:0; left:0; right:0; height:2px;
  background:linear-gradient(90deg,var(--profit),var(--accent));
  animation:scanH 2.5s linear infinite;
}
@keyframes scanH { from{transform:translateX(-100%)} to{transform:translateX(100%)} }
.alert-icon { font-size:26px; animation:alertBounce .9s ease infinite; }
@keyframes alertBounce { 0%,100%{transform:translateY(0) rotate(0)} 50%{transform:translateY(-5px) rotate(8deg)} }
.alert-text-big { font-size:14px; font-weight:900; color:var(--profit); }
.alert-text-sub { font-size:11px; color:var(--text2); margin-top:2px; }
.alert-close { position:absolute; top:8px; left:10px; font-size:14px; color:var(--text3); cursor:pointer; line-height:1; }

/* ════════════════════════════════════════
   SUMMARY CARD — 3D
════════════════════════════════════════ */
.summary-card {
  background:linear-gradient(145deg,#0d1e36,#0a1628);
  border:1px solid var(--border); border-radius:var(--r);
  padding:16px; position:relative; overflow:hidden;
  transform-style:preserve-3d;
  transition:transform .3s, box-shadow .3s;
  animation:slideIn .45s cubic-bezier(.34,1.2,.64,1) both;
}
@keyframes slideIn { from{opacity:0;transform:translateY(16px) scale(.97)} to{opacity:1;transform:none} }
.summary-card:hover {
  transform:perspective(600px) rotateX(1.5deg) translateY(-2px);
  box-shadow:0 12px 40px rgba(0,229,184,.09), 0 4px 12px rgba(0,0,0,.45);
}
.summary-card::before {
  content:''; position:absolute; top:0; left:0; right:0; height:2px;
  background:linear-gradient(90deg,var(--accent),var(--accent2),var(--accent3));
}
.summary-card::after {
  content:''; position:absolute; top:-45px; right:-45px;
  width:130px; height:130px;
  background:radial-gradient(circle,rgba(0,229,184,.08),transparent 70%);
  pointer-events:none; animation:orbFloat 5s ease-in-out infinite alternate;
}
@keyframes orbFloat { from{opacity:.5;transform:scale(1)} to{opacity:1;transform:scale(1.4)} }

.summary-top { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:14px; }
.summary-label { font-size:10px; color:var(--text3); text-transform:uppercase; letter-spacing:.8px; }
.total-value {
  font-family:'JetBrains Mono',monospace; font-size:28px; font-weight:700;
  line-height:1.1; margin-top:3px;
  animation:countIn .6s ease both;
}
@keyframes countIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:none} }
.total-egp { font-size:12px; color:var(--text2); margin-top:2px; font-family:'JetBrains Mono',monospace; }
.pnl-badge { display:flex; flex-direction:column; align-items:flex-end; gap:3px; }
.pnl-pct-big {
  font-size:20px; font-weight:900; font-family:'JetBrains Mono',monospace;
  padding:4px 12px; border-radius:10px; position:relative; overflow:hidden;
}
.pnl-pct-big.profit { background:rgba(0,214,143,.12); color:var(--profit); border:1px solid rgba(0,214,143,.2); }
.pnl-pct-big.loss   { background:rgba(255,61,90,.1);  color:var(--loss);   border:1px solid rgba(255,61,90,.18); }
.pnl-pct-big::after { content:''; position:absolute; inset:0; background:linear-gradient(135deg,rgba(255,255,255,.06),transparent); pointer-events:none; }
.pnl-abs { font-size:10px; color:var(--text2); font-family:'JetBrains Mono',monospace; }

.summary-grid { display:grid; grid-template-columns:1fr 1fr 1fr; gap:8px; margin-top:4px; }
.sum-stat {
  background:rgba(255,255,255,.025); border:1px solid rgba(255,255,255,.04);
  border-radius:var(--r2); padding:9px 10px;
  transition:transform .2s, background .2s;
}
.sum-stat:hover { transform:translateY(-2px) scale(1.01); background:rgba(255,255,255,.04); }
.sum-stat-label { font-size:9px; color:var(--text3); margin-bottom:3px; }
.sum-stat-val { font-size:12px; font-weight:700; font-family:'JetBrains Mono',monospace; color:var(--text); }
.sum-stat-sub { font-size:9px; color:var(--text3); margin-top:2px; }

/* ════════════════════════════════════════
   SECTION TITLE
════════════════════════════════════════ */
.section-title {
  font-size:10px; font-weight:700; color:var(--text3);
  text-transform:uppercase; letter-spacing:1px;
  display:flex; align-items:center; justify-content:space-between; padding:0 2px;
}
.section-count {
  background:var(--card2); border:1px solid var(--border);
  border-radius:20px; padding:2px 7px; font-size:9px; color:var(--text2);
}

/* ════════════════════════════════════════
   COIN CARDS — 3D tilt
════════════════════════════════════════ */
.coin-card {
  background:var(--card); border:1px solid var(--border); border-radius:var(--r);
  overflow:hidden; position:relative;
  transition:transform .25s, box-shadow .25s, border-color .2s;
  animation:slideIn .4s cubic-bezier(.34,1.2,.64,1) both;
  transform-style:preserve-3d;
}
.coin-card:hover {
  transform:perspective(500px) rotateX(1deg) translateY(-3px) scale(1.005);
  box-shadow:0 10px 30px rgba(0,0,0,.4);
}
.coin-card.profit { border-color:rgba(0,214,143,.22); }
.coin-card.profit:hover { box-shadow:0 10px 30px rgba(0,214,143,.07); }
.coin-card.loss   { border-color:rgba(255,61,90,.18); }
.coin-card.loss:hover   { box-shadow:0 10px 30px rgba(255,61,90,.07); }

.coin-bar { position:absolute; right:0; top:0; bottom:0; width:3px; border-radius:0 var(--r) var(--r) 0; }
.coin-card.profit .coin-bar { background:linear-gradient(180deg,var(--profit),rgba(0,214,143,.25)); }
.coin-card.loss   .coin-bar { background:linear-gradient(180deg,var(--loss),rgba(255,61,90,.25)); }

.coin-top { display:flex; align-items:center; justify-content:space-between; padding:12px 16px 10px 12px; }
.coin-id  { display:flex; align-items:center; gap:10px; }
.coin-ava {
  width:36px; height:36px; border-radius:50%;
  background:linear-gradient(135deg,var(--card2),var(--border));
  border:1px solid var(--border);
  display:flex; align-items:center; justify-content:center;
  font-size:10px; font-weight:700; color:var(--accent);
  font-family:'JetBrains Mono',monospace; flex-shrink:0;
  transition:transform .3s, box-shadow .3s;
}
.coin-card:hover .coin-ava { transform:rotate(10deg) scale(1.1); box-shadow:0 0 12px rgba(0,229,184,.25); }
.coin-sym { font-size:15px; font-weight:900; letter-spacing:.2px; }
.coin-pair-lbl { font-size:10px; color:var(--text3); }
.ch-badge { font-size:10px; font-weight:700; padding:2px 6px; border-radius:5px; margin-top:2px; display:inline-block; }
.ch-badge.profit { background:rgba(0,214,143,.1); color:var(--profit); }
.ch-badge.loss   { background:rgba(255,61,90,.1);  color:var(--loss); }

.coin-price-blk { text-align:left; }
.coin-price { font-family:'JetBrains Mono',monospace; font-size:17px; font-weight:700; }
.coin-price.profit { color:var(--profit); }
.coin-price.loss   { color:var(--loss); }
.coin-price-egp { font-size:9px; color:var(--text3); margin-top:2px; direction:ltr; }
.coin-sig-lbl   { font-size:9px; margin-top:3px; direction:ltr; }

.coin-stats {
  display:grid; grid-template-columns:1fr 1fr 1fr;
  background:rgba(0,0,0,.2); border-top:1px solid rgba(255,255,255,.04);
  padding:8px 12px;
}
.cs-lbl { font-size:9px; color:var(--text3); margin-bottom:2px; }
.cs-val { font-size:11px; font-weight:700; font-family:'JetBrains Mono',monospace; color:var(--text2); }

.coin-pnl {
  display:flex; align-items:center; justify-content:space-between;
  padding:8px 12px 10px; border-top:1px solid rgba(255,255,255,.04);
}
.pnl-usd { font-size:15px; font-weight:900; font-family:'JetBrains Mono',monospace; }
.pnl-usd.profit { color:var(--profit); } .pnl-usd.loss { color:var(--loss); }
.pnl-egp-label { font-size:9px; color:var(--text3); margin-top:1px; font-family:'JetBrains Mono',monospace; }
.pnl-right { display:flex; align-items:center; gap:8px; }
.pnl-pct-sm {
  font-size:12px; font-weight:700; font-family:'JetBrains Mono',monospace;
  padding:3px 9px; border-radius:7px;
}
.pnl-pct-sm.profit { background:rgba(0,214,143,.12); color:var(--profit); }
.pnl-pct-sm.loss   { background:rgba(255,61,90,.1);  color:var(--loss); }
.pnl-pct-sm.neutral{ color:var(--text3); }
.edit-btn {
  width:28px; height:28px; border-radius:7px;
  background:rgba(0,136,255,.1); border:1px solid rgba(0,136,255,.2);
  display:flex; align-items:center; justify-content:center;
  font-size:12px; cursor:pointer; transition:all .2s;
}
.edit-btn:hover { background:rgba(0,136,255,.22); transform:scale(1.1); }

/* ════════════════════════════════════════
   SIGNALS
════════════════════════════════════════ */
.ai-header-card {
  background:linear-gradient(135deg,rgba(124,58,237,.12),rgba(0,136,255,.08));
  border:1px solid rgba(124,58,237,.25); border-radius:var(--r); padding:14px;
  position:relative; overflow:hidden; animation:slideIn .4s ease both;
}
.ai-header-card::before {
  content:''; position:absolute; top:0; left:0; right:0; height:2px;
  background:linear-gradient(90deg,var(--accent3),var(--accent2),var(--accent));
}
.ai-top { display:flex; align-items:center; justify-content:space-between; margin-bottom:8px; }
.ai-label { display:flex; align-items:center; gap:7px; font-size:13px; font-weight:900; }
.ai-dot { width:7px; height:7px; border-radius:50%; background:var(--accent3); box-shadow:0 0 9px var(--accent3); animation:pdot 1.5s infinite; }
.ai-btn {
  background:linear-gradient(135deg,var(--accent3),var(--accent2));
  color:#fff; border:none; border-radius:var(--r2);
  padding:7px 16px; font-size:11px; font-weight:700;
  cursor:pointer; font-family:'Tajawal',sans-serif; transition:opacity .2s, transform .2s;
}
.ai-btn:hover:not([disabled]) { opacity:.85; transform:translateY(-1px); }
.ai-btn[disabled] { opacity:.45; cursor:not-allowed; }
.ai-meta { font-size:11px; color:var(--text2); line-height:2; }
.ai-disc { font-size:9px; color:var(--text3); margin-top:5px; padding-top:7px; border-top:1px solid rgba(255,255,255,.05); }

.signal-card {
  background:var(--card); border:1px solid var(--border); border-radius:var(--r);
  overflow:hidden; position:relative;
  animation:slideIn .35s ease both;
  transition:transform .25s, box-shadow .25s;
}
.signal-card:hover { transform:translateY(-2px); box-shadow:0 8px 26px rgba(0,0,0,.35); }
.signal-card.buy  { border-color:rgba(0,214,143,.2); }
.signal-card.sell { border-color:rgba(255,61,90,.18); }
.signal-card.wait { border-color:rgba(251,191,36,.18); }

.sig-top { display:flex; align-items:center; justify-content:space-between; padding:12px 14px 10px; }
.sig-coin { display:flex; align-items:center; gap:9px; }
.sig-ava {
  width:34px; height:34px; border-radius:50%;
  background:linear-gradient(135deg,var(--card2),var(--border)); border:1px solid var(--border);
  display:flex; align-items:center; justify-content:center;
  font-size:9px; font-weight:700; color:var(--accent); font-family:'JetBrains Mono',monospace;
}
.sig-sym  { font-size:13px; font-weight:900; }
.sig-time { font-size:9px; color:var(--text3); margin-top:1px; }
.sig-badge { font-size:13px; font-weight:900; padding:5px 13px; border-radius:var(--r2); }
.sig-badge.buy  { background:rgba(0,214,143,.12); color:var(--profit); }
.sig-badge.sell { background:rgba(255,61,90,.1);  color:var(--loss); }
.sig-badge.wait { background:rgba(251,191,36,.08);color:var(--gold); }
.sig-str { font-size:9px; color:var(--text3); margin-top:2px; text-align:left; }

.conf-row { display:flex; align-items:center; gap:8px; padding:0 14px 9px; }
.conf-lbl { font-size:9px; color:var(--text3); white-space:nowrap; }
.conf-track { flex:1; height:5px; background:rgba(255,255,255,.06); border-radius:3px; overflow:hidden; }
.conf-fill  { height:100%; border-radius:3px; transition:width .8s cubic-bezier(.34,1.2,.64,1); }
.conf-fill.buy  { background:linear-gradient(90deg,var(--profit),#00ffaa); }
.conf-fill.sell { background:linear-gradient(90deg,var(--loss),#ff8888); }
.conf-fill.wait { background:linear-gradient(90deg,var(--gold),#ffd700); }
.conf-pct { font-size:10px; font-weight:700; font-family:'JetBrains Mono',monospace; white-space:nowrap; }

.sig-reason {
  margin:0 14px 12px;
  background:rgba(255,255,255,.025); border-right:3px solid var(--border);
  border-radius:0 var(--r2) var(--r2) 0;
  padding:9px 12px; font-size:12px; color:var(--text2); line-height:1.85;
}
.signal-card.buy  .sig-reason { border-right-color:var(--profit); }
.signal-card.sell .sig-reason { border-right-color:var(--loss); }
.signal-card.wait .sig-reason { border-right-color:var(--gold); }

.sig-levels { display:grid; grid-template-columns:repeat(4,1fr); gap:1px; background:var(--border); border-top:1px solid var(--border); }
.sig-lv     { background:var(--card2); padding:8px 6px; text-align:center; }
.sig-lv-lbl { font-size:8px; color:var(--text3); margin-bottom:2px; text-transform:uppercase; letter-spacing:.4px; }
.sig-lv-val { font-size:10px; font-weight:700; font-family:'JetBrains Mono',monospace; }
.sig-lv-val.profit { color:var(--profit); } .sig-lv-val.loss { color:var(--loss); } .sig-lv-val.neutral { color:var(--text2); }

.skel { background:var(--card); border:1px solid var(--border); border-radius:var(--r); padding:14px; display:flex; flex-direction:column; gap:9px; }
.skel-line { background:rgba(255,255,255,.05); border-radius:4px; height:12px; animation:shim 1.5s infinite; }
.skel-line.m { width:60%; } .skel-line.s { width:40%; }
@keyframes shim { 0%,100%{opacity:.3} 50%{opacity:.8} }

/* ════════════════════════════════════════
   SETTINGS
════════════════════════════════════════ */
.settings-section {
  background:var(--card); border:1px solid var(--border); border-radius:var(--r);
  overflow:hidden; animation:slideIn .4s ease both;
}
.settings-section-title {
  padding:10px 14px; font-size:10px; font-weight:700; color:var(--accent);
  text-transform:uppercase; letter-spacing:1px;
  background:rgba(0,229,184,.03); border-bottom:1px solid var(--border);
}
.coin-row-item {
  display:flex; align-items:center; gap:10px; padding:11px 14px;
  border-bottom:1px solid rgba(255,255,255,.04); transition:background .18s;
}
.coin-row-item:last-child { border-bottom:none; }
.coin-row-item:hover { background:rgba(255,255,255,.02); }
.coin-row-ava {
  width:30px; height:30px; border-radius:50%;
  background:var(--card2); border:1px solid var(--border);
  display:flex; align-items:center; justify-content:center;
  font-size:9px; font-weight:700; color:var(--accent); font-family:'JetBrains Mono',monospace; flex-shrink:0;
}
.coin-row-info { flex:1; min-width:0; }
.coin-row-sym  { font-size:12px; font-weight:700; }
.coin-row-meta { font-size:10px; color:var(--text3); margin-top:1px; font-family:'JetBrains Mono',monospace; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.del-btn {
  width:28px; height:28px; border-radius:7px;
  background:rgba(255,61,90,.08); border:1px solid rgba(255,61,90,.18);
  display:flex; align-items:center; justify-content:center;
  font-size:12px; cursor:pointer; flex-shrink:0; transition:all .2s;
}
.del-btn:hover { background:rgba(255,61,90,.2); transform:scale(1.08); }

.add-form {
  background:rgba(0,229,184,.025); border:1px dashed rgba(0,229,184,.18);
  border-radius:var(--r); padding:14px; animation:slideIn .4s ease both;
}
.add-form-title { font-size:12px; font-weight:700; color:var(--accent); margin-bottom:10px; }
.form-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-bottom:8px; }
.form-field label { font-size:9px; color:var(--text3); font-weight:600; text-transform:uppercase; letter-spacing:.5px; display:block; margin-bottom:4px; }
.form-field input {
  width:100%; background:var(--card2); border:1px solid var(--border); border-radius:var(--r2);
  padding:9px 10px; color:var(--text); font-family:'JetBrains Mono',monospace;
  font-size:13px; outline:none; direction:ltr; transition:border-color .18s;
}
.form-field input:focus { border-color:var(--accent); }
.form-field input::placeholder { color:var(--text3); font-family:'Tajawal',sans-serif; direction:rtl; font-size:11px; }
.add-btn {
  width:100%; background:linear-gradient(135deg,var(--accent),var(--accent2));
  color:#000; border:none; border-radius:var(--r2);
  padding:10px; font-size:13px; font-weight:900; cursor:pointer;
  font-family:'Tajawal',sans-serif; transition:opacity .18s, transform .18s;
}
.add-btn:hover { opacity:.87; transform:translateY(-1px); }
.save-btn {
  width:100%; background:var(--card2); border:1px solid var(--border); border-radius:var(--r2);
  padding:10px; font-size:12px; font-weight:700; color:var(--accent);
  cursor:pointer; font-family:'Tajawal',sans-serif; transition:background .18s;
}
.save-btn:hover { background:var(--card); }
.info-box {
  background:rgba(0,229,184,.04); border:1px solid rgba(0,229,184,.14);
  border-radius:var(--r); padding:12px 14px;
  font-size:11px; color:var(--text3); line-height:2;
}

/* ════════════════════════════════════════
   MARKET BAR — bottom fixed
════════════════════════════════════════ */
.market-bar {
  flex-shrink:0; height:90px;
  background:var(--bg2); border-top:1px solid var(--border);
  position:relative; z-index:40; display:flex; flex-direction:column; overflow:hidden;
}
.market-bar::before {
  content:''; position:absolute; top:0; left:0; right:0; height:1px;
  background:linear-gradient(90deg,transparent,var(--accent2) 30%,var(--accent) 70%,transparent);
  opacity:.5;
}
.mbar-hdr {
  display:flex; align-items:center; gap:5px;
  padding:4px 12px 2px; font-size:8px; font-weight:700;
  color:var(--text3); text-transform:uppercase; letter-spacing:.8px; flex-shrink:0;
}
.market-grid {
  flex:1; display:grid; grid-template-columns:repeat(4,1fr);
  gap:1px; background:var(--border);
}
.mi {
  background:var(--bg2); display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  padding:5px 2px; gap:1px;
  transition:background .15s, transform .2s; cursor:default;
  position:relative; overflow:hidden;
}
.mi::after { content:''; position:absolute; inset:0; background:linear-gradient(135deg,rgba(255,255,255,.03),transparent); pointer-events:none; }
.mi:hover  { background:var(--card); transform:scale(1.03); }
.mi.up-flash { animation:mfU .7s ease; }
.mi.dn-flash { animation:mfD .7s ease; }
@keyframes mfU { 0%,100%{background:var(--bg2)} 45%{background:rgba(0,214,143,.15)} }
@keyframes mfD { 0%,100%{background:var(--bg2)} 45%{background:rgba(255,61,90,.12)} }
.mi-sym   { font-size:8px; font-weight:900; color:var(--text3); letter-spacing:.4px; font-family:'JetBrains Mono',monospace; }
.mi-price { font-size:11px; font-weight:700; font-family:'JetBrains Mono',monospace; line-height:1.1; }
.mi-price.profit { color:var(--profit); } .mi-price.loss { color:var(--loss); } .mi-price.nc { color:var(--text); }
.mi-chg   { font-size:8px; font-weight:700; padding:1px 5px; border-radius:3px; font-family:'JetBrains Mono',monospace; }
.mi-chg.up { background:rgba(0,214,143,.12); color:var(--profit); }
.mi-chg.dn { background:rgba(255,61,90,.1);  color:var(--loss); }
.mi-chg.nc { color:var(--text3); }

/* ════════════════════════════════════════
   FOOTER
════════════════════════════════════════ */
.footer {
  flex-shrink:0; height:28px;
  display:flex; align-items:center; justify-content:center; gap:7px;
  padding:0 16px;
  background:rgba(6,9,15,.98); border-top:1px solid var(--border);
  font-size:9px; color:var(--text3); position:relative; z-index:50;
}
.footer-name { color:var(--accent); font-weight:700; font-size:10px; }

/* ════════════════════════════════════════
   EDIT MODAL
════════════════════════════════════════ */
.modal-overlay {
  position:fixed; inset:0; z-index:300;
  background:rgba(6,9,15,.92); backdrop-filter:blur(12px);
  display:flex; align-items:flex-end; justify-content:center;
  opacity:0; transition:opacity .22s; pointer-events:none;
}
.modal-overlay.open { opacity:1; pointer-events:all; }
.modal-sheet {
  width:100%; max-width:480px;
  background:var(--card); border:1px solid var(--border2);
  border-radius:18px 18px 0 0; padding:0 0 calc(20px + var(--safe-bottom));
  transform:translateY(100%); transition:transform .28s cubic-bezier(.34,1.1,.64,1);
  box-shadow:0 -12px 50px rgba(0,0,0,.6);
}
.modal-overlay.open .modal-sheet { transform:translateY(0); }
.modal-handle { width:32px; height:4px; border-radius:2px; background:var(--border2); margin:12px auto 0; }
.modal-header {
  display:flex; align-items:center; justify-content:space-between;
  padding:12px 18px; border-bottom:1px solid var(--border);
}
.modal-title { font-size:15px; font-weight:900; }
.modal-close {
  width:30px; height:30px; border-radius:7px;
  background:var(--card2); border:1px solid var(--border);
  display:flex; align-items:center; justify-content:center;
  font-size:15px; cursor:pointer; color:var(--text2);
}
.modal-body { padding:16px 18px; display:flex; flex-direction:column; gap:14px; }
.modal-coin-info {
  display:flex; align-items:center; gap:10px; padding:10px 12px;
  background:rgba(0,229,184,.04); border:1px solid rgba(0,229,184,.12); border-radius:var(--r2);
}
.m-ava {
  width:40px; height:40px; border-radius:50%;
  background:linear-gradient(135deg,var(--card2),var(--border)); border:1px solid var(--border);
  display:flex; align-items:center; justify-content:center;
  font-size:11px; font-weight:700; color:var(--accent); font-family:'JetBrains Mono',monospace;
}
.m-sym  { font-size:16px; font-weight:900; }
.m-pair { font-size:11px; color:var(--text3); margin-top:2px; }
.m-field label { font-size:9px; color:var(--text3); font-weight:700; text-transform:uppercase; letter-spacing:.6px; display:block; margin-bottom:5px; }
.m-field input {
  width:100%; background:var(--card2); border:1px solid var(--border); border-radius:var(--r2);
  padding:11px 12px; color:var(--text); font-family:'JetBrains Mono',monospace;
  font-size:14px; outline:none; direction:ltr; transition:border-color .18s;
}
.m-field input:focus { border-color:var(--accent); }
.m-hint { font-size:9px; color:var(--text3); margin-top:4px; }
.modal-actions { display:grid; grid-template-columns:1fr 1fr; gap:10px; padding:0 18px 4px; }
.m-save { background:linear-gradient(135deg,var(--accent),var(--accent2)); color:#000; border:none; border-radius:var(--r2); padding:13px; font-size:13px; font-weight:900; cursor:pointer; font-family:'Tajawal',sans-serif; }
.m-del  { background:rgba(255,61,90,.08); border:1px solid rgba(255,61,90,.2); color:var(--loss); border-radius:var(--r2); padding:13px; font-size:12px; font-weight:700; cursor:pointer; font-family:'Tajawal',sans-serif; }
.m-divider { height:1px; background:var(--border); margin:4px 18px; }

/* ════════════════════════════════════════
   EMPTY / TOAST
════════════════════════════════════════ */
.empty-state { display:flex; flex-direction:column; align-items:center; padding:50px 24px; text-align:center; }
.empty-icon  { font-size:48px; margin-bottom:14px; opacity:.3; }
.empty-text  { font-size:13px; color:var(--text3); line-height:2; }

.toast {
  position:fixed; bottom:calc(90px + 28px + 12px);
  left:50%; transform:translateX(-50%) translateY(10px);
  background:var(--accent); color:#000;
  padding:9px 20px; border-radius:9px;
  font-size:12px; font-weight:700; opacity:0;
  transition:all .3s cubic-bezier(.34,1.56,.64,1);
  z-index:999; white-space:nowrap; pointer-events:none; max-width:92%;
}
.toast.show   { opacity:1; transform:translateX(-50%) translateY(0); }
.toast.err    { background:var(--loss); color:#fff; }
.toast.gold   { background:var(--gold); color:#000; }

/* helpers */
.profit  { color:var(--profit)!important; }
.loss    { color:var(--loss)!important; }
.neutral { color:var(--text2)!important; }
.spin { animation:spin .8s linear infinite; display:inline-block; }
@keyframes spin { to { transform:rotate(360deg); } }
</style>
</head>
<body>
<div id="app">

  <!-- HEADER -->
  <div class="header">
    <div class="brand">
      <div class="brand-icon">₿</div>
      <div>
        <div class="brand-name"><span>OKX</span> Tracker</div>
        <div class="brand-by">م. محمد حماد</div>
      </div>
    </div>
    <div class="header-right">
      <div class="live-pill"><div class="pdot"></div>مباشر</div>
      <a class="h-btn fb" href="https://www.facebook.com/en.mohamed.nasr" target="_blank" rel="noopener">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor">
          <path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/>
        </svg>
      </a>
      <div class="h-btn" id="refreshBtn" title="تحديث">🔄</div>
    </div>
  </div>

  <!-- TABS -->
  <div class="tabs">
    <button class="tab active" data-tab="portfolio"><span>📊</span> محفظتي</button>
    <button class="tab" data-tab="signals"><span>🤖</span> إشارات AI</button>
    <button class="tab" data-tab="settings"><span>⚙️</span> إعدادات</button>
  </div>

  <!-- QUICK PANEL -->
  <div class="qp-wrap" id="qpWrap">
    <div class="qp-toggle" id="qpToggle">
      <div class="qp-pills">
        <div class="qp-pill">
          <span class="qp-lbl">💱</span>
          <span class="qp-val gold" id="qpEgpVal">—</span>
          <span class="qp-lbl">ج.م</span>
        </div>
        <div class="qp-sep"></div>
        <div class="qp-pill">
          <span class="qp-lbl">🔔</span>
          <span class="qp-val gold" id="qpAlertVal">—</span>
          <span class="qp-lbl">$</span>
        </div>
        <div class="qp-sep" id="qpPnlSep" style="display:none"></div>
        <div class="qp-pill" id="qpPnlPill" style="display:none">
          <span class="qp-lbl" id="qpPnlLbl">ربح</span>
          <span class="qp-val profit" id="qpPnlVal">—</span>
        </div>
      </div>
      <div class="qp-chevron" id="qpChevron">▼</div>
    </div>
    <div class="qp-body" id="qpBody">
      <div class="qp-inner">
        <div class="qp-field">
          <div class="qp-field-lbl">💱 سعر الدولار</div>
          <div class="qp-iw">
            <span class="qp-ico">ج</span>
            <input class="qp-inp" id="qpEgpInp" type="number" step="0.5" min="1" inputmode="decimal">
          </div>
          <div class="qp-hint">بالجنيه المصري</div>
        </div>
        <div class="qp-field">
          <div class="qp-field-lbl">🔔 تنبيه كل ($)</div>
          <div class="qp-iw">
            <span class="qp-ico">$</span>
            <input class="qp-inp" id="qpAlertInp" type="number" step="1" min="1" inputmode="decimal">
          </div>
          <div class="qp-hint" id="qpAlertSub">كل مضاعف يجيك تنبيه</div>
        </div>
        <button class="qp-save" id="qpSaveBtn">💾 حفظ التغييرات</button>
      </div>
    </div>
  </div>

  <!-- MAIN CONTENT -->
  <div class="scroll-area" id="mainScreen"></div>

  <!-- MARKET BAR -->
  <div class="market-bar" id="marketBar">
    <div class="mbar-hdr">
      <div class="pdot" style="background:var(--accent2)"></div>
      أسعار السوق
    </div>
    <div class="market-grid" id="marketGrid"></div>
  </div>

  <!-- FOOTER -->
  <div class="footer">
    <span>تصميم وبرمجة</span>
    <span class="footer-name">🛠️ م. محمد حماد</span>
    <span>•</span>
    <a href="https://www.facebook.com/en.mohamed.nasr" target="_blank" rel="noopener"
       style="color:var(--accent2);text-decoration:none">📘 Facebook</a>
    <span>•</span>
    <span id="dbStatus" style="font-size:8px">🟡 جاري الاتصال...</span>
  </div>

</div><!-- /#app -->

<!-- EDIT MODAL -->
<div class="modal-overlay" id="editModal">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-header">
      <div class="modal-title">✏️ تعديل العملة</div>
      <div class="modal-close" id="modalCloseBtn">✕</div>
    </div>
    <div class="modal-body">
      <div class="modal-coin-info">
        <div class="m-ava" id="editAva">—</div>
        <div>
          <div class="m-sym"  id="editSymLabel">—</div>
          <div class="m-pair" id="editPairLabel">—</div>
        </div>
      </div>
      <div class="m-field">
        <label>الكمية</label>
        <input id="editQty" type="number" step="any" inputmode="decimal" placeholder="مثال: 0.5">
        <div class="m-hint">عدد الوحدات اللي عندك</div>
      </div>
      <div class="m-field">
        <label>متوسط سعر الشراء (USD)</label>
        <input id="editAvg" type="number" step="any" inputmode="decimal" placeholder="مثال: 45000">
        <div class="m-hint">متوسط السعر اللي اشتريت بيه</div>
      </div>
    </div>
    <div class="m-divider"></div>
    <div class="modal-actions">
      <button class="m-save" id="modalSaveBtn">💾 حفظ</button>
      <button class="m-del"  id="modalDelBtn">🗑️ حذف</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<script src="app.js"></script>
</body>
</html>
