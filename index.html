<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="OKX Tracker">
<meta name="theme-color" content="#0a0e1a">
<title>OKX Tracker</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;900&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #070b14;
  --bg2: #0d1420;
  --card: #111c2e;
  --card2: #162035;
  --border: #1a2840;
  --accent: #00e5b8;
  --accent2: #0088ff;
  --accent3: #7c3aed;
  --profit: #00d68f;
  --loss: #ff3d5a;
  --gold: #fbbf24;
  --text: #e2eeff;
  --text2: #7a95c0;
  --text3: #3d5278;
  --r: 16px;
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}

* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

html, body {
  width:100%; height:100%;
  background:var(--bg);
  color:var(--text);
  font-family:'Tajawal', sans-serif;
  overflow:hidden;
  user-select:none;
}

/* ═══════════════════════════════════════
   LAYOUT
═══════════════════════════════════════ */
#app {
  display:flex; flex-direction:column;
  height:100vh; height:100dvh;
  padding-top:var(--safe-top);
  padding-bottom:var(--safe-bottom);
  background: radial-gradient(ellipse at 20% 0%, rgba(0,229,184,.06) 0%, transparent 50%),
              radial-gradient(ellipse at 80% 100%, rgba(0,136,255,.05) 0%, transparent 50%),
              var(--bg);
}

/* ═══════════════════════════════════════
   HEADER
═══════════════════════════════════════ */
.top-bar {
  display:flex; align-items:center; justify-content:space-between;
  padding:14px 18px 10px;
  background:rgba(7,11,20,.9);
  backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border);
  flex-shrink:0;
  position:relative;
  z-index:10;
}
.top-bar::after {
  content:'';
  position:absolute; bottom:0; left:0; right:0; height:1px;
  background:linear-gradient(90deg, transparent, var(--accent), transparent);
  opacity:.4;
}
.brand { display:flex; align-items:center; gap:10px; }
.brand-icon {
  width:36px; height:36px;
  background:linear-gradient(135deg, var(--accent), var(--accent2));
  border-radius:10px;
  display:flex; align-items:center; justify-content:center;
  font-size:18px;
  box-shadow: 0 0 20px rgba(0,229,184,.3);
}
.brand-name { font-size:18px; font-weight:900; letter-spacing:-.5px; }
.brand-name span { background:linear-gradient(135deg,var(--accent),var(--accent2)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
.top-actions { display:flex; align-items:center; gap:8px; }
.live-pill {
  display:flex; align-items:center; gap:5px;
  background:rgba(0,214,143,.1);
  border:1px solid rgba(0,214,143,.25);
  border-radius:20px; padding:4px 10px;
  font-size:11px; font-weight:700; color:var(--profit);
}
.pulse { width:6px; height:6px; border-radius:50%; background:var(--profit); animation:pulse 1.4s infinite; }
@keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.3;transform:scale(.6)} }
.icon-btn {
  width:34px; height:34px;
  background:var(--card); border:1px solid var(--border);
  border-radius:9px;
  display:flex; align-items:center; justify-content:center;
  font-size:16px; cursor:pointer;
  transition:all .2s;
}
.icon-btn:active { transform:scale(.9); background:var(--card2); }

/* ═══════════════════════════════════════
   SCROLL AREA
═══════════════════════════════════════ */
.scroll-area {
  flex:1; overflow-y:auto; overflow-x:hidden;
  -webkit-overflow-scrolling:touch;
  padding:14px 14px 20px;
  display:flex; flex-direction:column; gap:12px;
}
.scroll-area::-webkit-scrollbar { display:none; }

/* ═══════════════════════════════════════
   PROFIT ALERT BANNER
═══════════════════════════════════════ */
.profit-alert-banner {
  display:flex; align-items:center; gap:12px;
  background:linear-gradient(135deg, rgba(0,214,143,.18), rgba(0,229,184,.08));
  border:1.5px solid rgba(0,214,143,.45);
  border-radius:14px; padding:14px 16px;
  animation:alertPop .5s cubic-bezier(.34,1.56,.64,1);
  position:relative; overflow:hidden;
}
.profit-alert-banner::before {
  content:''; position:absolute; top:0; left:0; right:0; height:2px;
  background:linear-gradient(90deg, var(--profit), var(--accent));
  animation:scanline 2s linear infinite;
}
@keyframes scanline { 0%{transform:translateX(-100%)} 100%{transform:translateX(100%)} }
@keyframes alertPop { 0%{transform:scale(.9);opacity:0} 100%{transform:scale(1);opacity:1} }
.alert-icon { font-size:28px; animation:abounce 1s ease infinite; }
@keyframes abounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-4px)} }
.alert-text-big { font-size:16px; font-weight:900; color:var(--profit); }
.alert-text-sub { font-size:12px; color:var(--text2); margin-top:3px; }
.alert-close { position:absolute; top:8px; left:10px; font-size:16px; color:var(--text3); cursor:pointer; padding:4px; }

/* ═══════════════════════════════════════
   PORTFOLIO SUMMARY CARD
═══════════════════════════════════════ */
.summary-card {
  background:linear-gradient(135deg, #0f1e35 0%, #0d1a2e 100%);
  border:1px solid var(--border);
  border-radius:var(--r);
  padding:18px;
  position:relative; overflow:hidden;
}
.summary-card::before {
  content:''; position:absolute; top:0; left:0; right:0; height:2px;
  background:linear-gradient(90deg, var(--accent), var(--accent2), var(--accent3));
}
.summary-card::after {
  content:'';
  position:absolute; top:-60px; right:-60px;
  width:180px; height:180px;
  background:radial-gradient(circle, rgba(0,229,184,.07), transparent 70%);
  pointer-events:none;
}
.summary-top {
  display:flex; justify-content:space-between; align-items:flex-start;
  margin-bottom:16px;
}
.summary-label { font-size:11px; color:var(--text3); font-weight:500; text-transform:uppercase; letter-spacing:.8px; }
.total-value {
  font-family:'JetBrains Mono', monospace;
  font-size:32px; font-weight:700;
  line-height:1.1;
  margin-top:4px;
}
.total-egp { font-size:14px; color:var(--text2); margin-top:3px; font-family:'JetBrains Mono',monospace; }
.pnl-badge {
  display:flex; flex-direction:column; align-items:flex-end; gap:3px;
}
.pnl-pct-big {
  font-size:22px; font-weight:900; font-family:'JetBrains Mono',monospace;
  padding:4px 12px; border-radius:10px;
}
.pnl-pct-big.profit { background:rgba(0,214,143,.15); color:var(--profit); }
.pnl-pct-big.loss   { background:rgba(255,61,90,.12);  color:var(--loss); }
.pnl-abs { font-size:11px; color:var(--text2); font-family:'JetBrains Mono',monospace; }

.summary-grid {
  display:grid; grid-template-columns:1fr 1fr 1fr;
  gap:10px; margin-top:4px;
}
.sum-stat { background:rgba(255,255,255,.03); border-radius:10px; padding:10px; }
.sum-stat-label { font-size:10px; color:var(--text3); margin-bottom:4px; }
.sum-stat-val { font-size:14px; font-weight:700; font-family:'JetBrains Mono',monospace; color:var(--text); }
.sum-stat-sub { font-size:10px; color:var(--text3); margin-top:2px; }

/* EGP rate strip */
.rate-strip {
  display:flex; align-items:center; justify-content:space-between;
  background:var(--card); border:1px solid var(--border);
  border-radius:10px; padding:8px 14px;
}
.rate-strip-label { font-size:11px; color:var(--text3); }
.rate-strip-val { font-size:13px; font-weight:700; color:var(--gold); font-family:'JetBrains Mono',monospace; }
.rate-strip-time { font-size:10px; color:var(--text3); }

/* ═══════════════════════════════════════
   COIN CARDS
═══════════════════════════════════════ */
.section-title {
  font-size:11px; font-weight:700; color:var(--text3);
  text-transform:uppercase; letter-spacing:1px;
  display:flex; align-items:center; justify-content:space-between;
}
.section-count {
  background:var(--card2); border:1px solid var(--border);
  border-radius:20px; padding:2px 8px;
  font-size:10px; color:var(--text2);
}

.coin-card {
  background:var(--card);
  border:1px solid var(--border);
  border-radius:var(--r);
  overflow:hidden;
  position:relative;
  transition:transform .15s;
}
.coin-card:active { transform:scale(.98); }
.coin-card.profit { border-color:rgba(0,214,143,.25); }
.coin-card.loss   { border-color:rgba(255,61,90,.2); }
.coin-side-bar {
  position:absolute; right:0; top:0; bottom:0; width:3px;
}
.coin-card.profit .coin-side-bar { background:var(--profit); }
.coin-card.loss   .coin-side-bar { background:var(--loss); }

.coin-main { padding:14px 14px 10px; }
.coin-row1 { display:flex; align-items:center; justify-content:space-between; margin-bottom:12px; }
.coin-identity { display:flex; align-items:center; gap:10px; }
.coin-ava {
  width:40px; height:40px; border-radius:50%;
  background:linear-gradient(135deg, var(--card2), var(--border));
  border:1px solid var(--border);
  display:flex; align-items:center; justify-content:center;
  font-size:12px; font-weight:700; color:var(--accent);
  font-family:'JetBrains Mono',monospace;
  flex-shrink:0;
}
.coin-sym { font-size:17px; font-weight:900; }
.coin-pair { font-size:11px; color:var(--text3); }
.coin-change-badge {
  font-size:11px; font-weight:700;
  padding:2px 7px; border-radius:6px; margin-top:2px;
  display:inline-block;
}
.coin-change-badge.profit { background:rgba(0,214,143,.12); color:var(--profit); }
.coin-change-badge.loss   { background:rgba(255,61,90,.1);  color:var(--loss); }

.coin-price-block { text-align:left; }
.coin-price {
  font-family:'JetBrains Mono',monospace;
  font-size:20px; font-weight:700;
}
.coin-price.profit { color:var(--profit); }
.coin-price.loss   { color:var(--loss); }
.coin-price-egp { font-size:11px; color:var(--text3); text-align:left; margin-top:1px; }

.coin-stats-grid {
  display:grid; grid-template-columns:1fr 1fr 1fr;
  gap:8px;
  padding:10px 14px;
  background:rgba(0,0,0,.2);
  border-top:1px solid rgba(255,255,255,.04);
}
.cstat-label { font-size:10px; color:var(--text3); margin-bottom:2px; }
.cstat-val { font-size:12px; font-weight:600; font-family:'JetBrains Mono',monospace; color:var(--text2); }

.coin-pnl-bar {
  display:flex; align-items:center; justify-content:space-between;
  padding:10px 14px;
  background:rgba(0,0,0,.15);
  border-top:1px solid rgba(255,255,255,.04);
}
.coin-pnl-usd {
  font-size:15px; font-weight:700;
  font-family:'JetBrains Mono',monospace;
}
.coin-pnl-egp { font-size:11px; color:var(--text3); margin-top:1px; }
.coin-pnl-pct {
  font-size:16px; font-weight:900;
  padding:4px 12px; border-radius:8px;
  font-family:'JetBrains Mono',monospace;
}
.coin-pnl-pct.profit { background:rgba(0,214,143,.15); color:var(--profit); }
.coin-pnl-pct.loss   { background:rgba(255,61,90,.12);  color:var(--loss); }

/* ═══════════════════════════════════════
   AI SIGNALS
═══════════════════════════════════════ */
.ai-header-card {
  background:linear-gradient(135deg, #110d2a 0%, #0d1525 100%);
  border:1px solid rgba(124,58,237,.25);
  border-radius:var(--r); padding:14px 16px;
  position:relative; overflow:hidden;
}
.ai-header-card::before {
  content:''; position:absolute; top:0; left:0; right:0; height:2px;
  background:linear-gradient(90deg, var(--accent3), var(--accent2), var(--accent));
}
.ai-top { display:flex; align-items:center; justify-content:space-between; margin-bottom:8px; }
.ai-label { display:flex; align-items:center; gap:7px; font-size:13px; font-weight:700; color:var(--accent); }
.ai-dot { width:8px; height:8px; border-radius:50%; background:var(--accent3); animation:pulse 2s infinite; }
.ai-analyze-btn {
  background:linear-gradient(135deg, var(--accent3), var(--accent2));
  color:#fff; border:none; border-radius:8px;
  padding:7px 14px; font-size:12px; font-weight:700;
  cursor:pointer; font-family:'Tajawal',sans-serif;
  transition:all .2s;
}
.ai-analyze-btn:active { transform:scale(.95); opacity:.8; }
.ai-analyze-btn:disabled { opacity:.5; cursor:not-allowed; }
.ai-meta { font-size:11px; color:var(--text3); }
.ai-meta strong { color:var(--text2); }
.ai-disclaimer {
  margin-top:10px; padding:8px 10px;
  background:rgba(251,191,36,.06); border:1px solid rgba(251,191,36,.15);
  border-radius:8px; font-size:11px; color:var(--gold); line-height:1.6;
}
.ai-coin-select { display:flex; flex-wrap:wrap; gap:8px; margin-top:10px; }
.ai-coin-chip {
  padding:6px 14px; border-radius:20px;
  background:var(--card2); border:1px solid var(--border);
  font-size:12px; font-weight:700; cursor:pointer;
  transition:all .2s; font-family:'JetBrains Mono',monospace; color:var(--text2);
}
.ai-coin-chip.active { background:rgba(0,229,184,.12); border-color:var(--accent); color:var(--accent); }
.ai-coin-chip:active { transform:scale(.95); }

.signal-skeleton {
  background:var(--card); border:1px solid var(--border);
  border-radius:var(--r); padding:20px;
  display:flex; flex-direction:column; gap:12px;
}
.skel-line {
  height:14px; border-radius:7px;
  background:linear-gradient(90deg, var(--card2) 25%, var(--border) 50%, var(--card2) 75%);
  background-size:200% 100%; animation:shimmer 1.4s infinite;
}
@keyframes shimmer { to { background-position:-200% 0; } }
.skel-line.short { width:40%; }
.skel-line.medium { width:70%; }

.signal-card {
  background:var(--card); border:1px solid var(--border);
  border-radius:var(--r); overflow:hidden; position:relative;
}
.signal-card.buy  { border-color:rgba(0,214,143,.3); }
.signal-card.sell { border-color:rgba(255,61,90,.25); }
.signal-card.wait { border-color:rgba(251,191,36,.2); }
.signal-top { display:flex; align-items:center; justify-content:space-between; padding:14px; }
.sig-coin { display:flex; align-items:center; gap:10px; }
.sig-ava {
  width:38px; height:38px; border-radius:50%;
  background:var(--card2); border:1px solid var(--border);
  display:flex; align-items:center; justify-content:center;
  font-size:11px; font-weight:700; color:var(--accent);
  font-family:'JetBrains Mono',monospace;
}
.sig-sym { font-size:15px; font-weight:900; }
.sig-time { font-size:10px; color:var(--text3); margin-top:2px; }
.sig-badge-wrap { display:flex; flex-direction:column; align-items:flex-end; gap:3px; }
.sig-main {
  font-size:15px; font-weight:900; padding:5px 14px; border-radius:10px;
  display:flex; align-items:center; gap:5px;
}
.sig-main.buy  { background:rgba(0,214,143,.15); color:var(--profit); }
.sig-main.sell { background:rgba(255,61,90,.12);  color:var(--loss); }
.sig-main.wait { background:rgba(251,191,36,.1);  color:var(--gold); }
.sig-str { font-size:10px; color:var(--text3); }
.sig-conf-row { display:flex; align-items:center; gap:10px; padding:0 14px 10px; }
.conf-label { font-size:10px; color:var(--text3); white-space:nowrap; }
.conf-track { flex:1; height:6px; background:var(--card2); border-radius:3px; overflow:hidden; }
.conf-fill { height:100%; border-radius:3px; transition:width .6s ease; }
.conf-fill.buy  { background:linear-gradient(90deg, var(--profit), #00ffaa); }
.conf-fill.sell { background:linear-gradient(90deg, var(--loss), #ff6b6b); }
.conf-fill.wait { background:linear-gradient(90deg, var(--gold), #ffd700); }
.conf-pct { font-size:12px; font-weight:700; font-family:'JetBrains Mono',monospace; white-space:nowrap; }
.sig-reason {
  margin:0 14px 10px;
  background:rgba(255,255,255,.03);
  border-right:3px solid var(--border);
  border-radius:0 6px 6px 0;
  padding:8px 10px;
  font-size:12px; color:var(--text2); line-height:1.6;
}
.signal-card.buy  .sig-reason { border-right-color:var(--profit); }
.signal-card.sell .sig-reason { border-right-color:var(--loss); }
.signal-card.wait .sig-reason { border-right-color:var(--gold); }
.sig-levels {
  display:grid; grid-template-columns:1fr 1fr 1fr 1fr;
  gap:1px; background:var(--border); border-top:1px solid var(--border);
}
.sig-level { background:var(--card2); padding:9px 8px; text-align:center; }
.sig-level-label { font-size:9px; color:var(--text3); margin-bottom:3px; text-transform:uppercase; letter-spacing:.5px; }
.sig-level-val { font-size:11px; font-weight:700; font-family:'JetBrains Mono',monospace; }
.sig-level-val.profit { color:var(--profit); }
.sig-level-val.loss   { color:var(--loss); }
.sig-level-val.neutral { color:var(--text2); }

/* ═══════════════════════════════════════
   SETTINGS SCREEN
═══════════════════════════════════════ */
.settings-section {
  background:var(--card); border:1px solid var(--border);
  border-radius:var(--r); overflow:hidden;
}
.settings-section-title {
  padding:12px 16px; font-size:11px; font-weight:700; color:var(--accent);
  text-transform:uppercase; letter-spacing:1px;
  background:rgba(0,229,184,.04); border-bottom:1px solid var(--border);
}
.setting-row {
  display:flex; align-items:center; justify-content:space-between;
  padding:13px 16px; border-bottom:1px solid rgba(255,255,255,.04);
}
.setting-row:last-child { border-bottom:none; }
.setting-label { font-size:13px; color:var(--text); }
.setting-sub { font-size:11px; color:var(--text3); margin-top:2px; }
.setting-input {
  background:var(--card2); border:1px solid var(--border);
  border-radius:8px; padding:8px 12px;
  color:var(--text); font-family:'JetBrains Mono',monospace;
  font-size:14px; outline:none; width:140px;
  text-align:left; direction:ltr;
}
.setting-input:focus { border-color:var(--accent); }

.coin-row-item {
  display:flex; align-items:center; gap:10px;
  padding:12px 16px; border-bottom:1px solid rgba(255,255,255,.04);
}
.coin-row-item:last-child { border-bottom:none; }
.coin-row-ava {
  width:36px; height:36px; border-radius:50%;
  background:var(--card2); border:1px solid var(--border);
  display:flex; align-items:center; justify-content:center;
  font-size:11px; font-weight:700; color:var(--accent);
  font-family:'JetBrains Mono',monospace; flex-shrink:0;
}
.coin-row-info { flex:1; }
.coin-row-sym { font-size:14px; font-weight:700; }
.coin-row-meta { font-size:11px; color:var(--text3); margin-top:2px; font-family:'JetBrains Mono',monospace; }
.edit-btn {
  width:32px; height:32px; border-radius:8px;
  background:rgba(0,136,255,.1); border:1px solid rgba(0,136,255,.2);
  display:flex; align-items:center; justify-content:center;
  font-size:14px; cursor:pointer; transition:all .2s;
}
.edit-btn:active { transform:scale(.88); }
.del-btn {
  width:32px; height:32px; border-radius:8px;
  background:rgba(255,61,90,.1); border:1px solid rgba(255,61,90,.2);
  display:flex; align-items:center; justify-content:center;
  font-size:14px; cursor:pointer; transition:all .2s;
}
.del-btn:active { transform:scale(.88); }

/* Add form */
.add-form {
  background:rgba(0,229,184,.04);
  border:1px dashed rgba(0,229,184,.2);
  border-radius:var(--r); padding:14px;
}
.add-form-title { font-size:12px; font-weight:700; color:var(--accent); margin-bottom:12px; }
.form-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:10px; }
.form-field label { font-size:10px; color:var(--text3); font-weight:600; text-transform:uppercase; letter-spacing:.5px; display:block; margin-bottom:5px; }
.form-field input {
  width:100%; background:var(--card2);
  border:1px solid var(--border); border-radius:8px;
  padding:10px 12px; color:var(--text);
  font-family:'JetBrains Mono',monospace;
  font-size:14px; outline:none;
  text-align:left; direction:ltr;
}
.form-field input:focus { border-color:var(--accent); }
.form-field input::placeholder { color:var(--text3); font-family:'Tajawal',sans-serif; direction:rtl; font-size:12px; }
.add-btn {
  width:100%; background:linear-gradient(135deg, var(--accent), var(--accent2));
  color:#000; border:none; border-radius:10px;
  padding:13px; font-size:15px; font-weight:900;
  cursor:pointer; font-family:'Tajawal',sans-serif; transition:all .2s;
}
.add-btn:active { transform:scale(.97); opacity:.85; }
.save-btn {

═══════════════════════════════════════ */
.modal-backdrop {
  position:fixed; inset:0; z-index:200;
  background:rgba(7,11,20,.85); backdrop-filter:blur(10px);
  display:flex; align-items:flex-end; justify-content:center;

}

.modal-sheet {
  width:100%; max-width:480px;
  background:var(--card); border:1px solid var(--border);
  border-radius:20px 20px 0 0;
  padding:0 0 calc(16px + var(--safe-bottom));
  transform:translateY(100%); transition:transform .3s cubic-bezier(.34,1.1,.64,1);
  max-height:90vh; overflow-y:auto;
}
.modal-backdrop.open .modal-sheet { transform:translateY(0); }
.modal-handle { width:36px; height:4px; border-radius:2px; background:var(--border); margin:12px auto 0; }
.modal-header {
  display:flex; align-items:center; justify-content:space-between;
  padding:16px 18px 14px; border-bottom:1px solid var(--border);
}
.modal-title { font-size:16px; font-weight:900; }
.modal-close {
  width:32px; height:32px; border-radius:8px;

}
.modal-close:active { transform:scale(.9); }
.modal-body { padding:16px 18px; display:flex; flex-direction:column; gap:14px; }
.modal-coin-info {
  display:flex; align-items:center; gap:12px; padding:12px 14px;

}
.modal-coin-ava {
  width:44px; height:44px; border-radius:50%;

  font-size:13px; font-weight:700; color:var(--accent);

}
.modal-coin-sym { font-size:18px; font-weight:900; }
.modal-coin-pair { font-size:12px; color:var(--text3); margin-top:2px; }
.modal-field label { font-size:10px; color:var(--text3); font-weight:700; text-transform:uppercase; letter-spacing:.6px; display:block; margin-bottom:6px; }
.modal-field input {
  width:100%; background:var(--card2); border:1px solid var(--border);
  border-radius:10px; padding:12px 14px; color:var(--text);

}
.modal-field input:focus { border-color:var(--accent); }
.modal-field-hint { font-size:10px; color:var(--text3); margin-top:5px; }
.modal-actions { display:grid; grid-template-columns:1fr 1fr; gap:10px; padding:0 18px 10px; }
.modal-save-btn {
  background:linear-gradient(135deg, var(--accent), var(--accent2)); color:#000; border:none;
  border-radius:12px; padding:14px; font-size:15px; font-weight:900;
  cursor:pointer; font-family:'Tajawal',sans-serif; transition:all .2s;
}
.modal-save-btn:active { transform:scale(.96); opacity:.85; }
.modal-del-btn {
  background:rgba(255,61,90,.1); border:1px solid rgba(255,61,90,.25); color:var(--loss);
  border-radius:12px; padding:14px; font-size:14px; font-weight:700;
  cursor:pointer; font-family:'Tajawal',sans-serif; transition:all .2s;
}
.modal-del-btn:active { transform:scale(.96); background:rgba(255,61,90,.2); }
.modal-divider { height:1px; background:var(--border); margin:0 18px; }

/* ═══════════════════════════════════════
   EMPTY / TOAST
═══════════════════════════════════════ */
.empty-state {
  display:flex; flex-direction:column; align-items:center;
  padding:50px 20px; text-align:center;
}
.empty-icon { font-size:50px; margin-bottom:16px; opacity:.4; }
.empty-text { font-size:14px; color:var(--text3); line-height:1.8; }

.toast {
  position:fixed; bottom:calc(var(--safe-bottom) + 70px); left:50%;
  transform:translateX(-50%) translateY(30px);
  background:var(--accent); color:#000;
  padding:11px 22px; border-radius:10px;
  font-size:14px; font-weight:700;

.toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
.toast.err  { background:var(--loss); color:#fff; }

/* bottom nav */
.bottom-nav {
  display:flex;
  background:rgba(7,11,20,.95);

}
.nav-btn .nav-icon { font-size:20px; transition:all .2s; }
.nav-btn.active { color:var(--accent); }

/* utility */
.profit { color:var(--profit) !important; }
.loss   { color:var(--loss) !important; }
.neutral { color:var(--text2) !important; }
.mono { font-family:'JetBrains Mono',monospace; }
.spin { animation:spinr 1s linear infinite; display:inline-block; }
@keyframes spinr { to { transform:rotate(360deg); } }
</style>
</head>

<script>
// ════════════════════════════════════════════════════
//  PROFIT ALERT — صوت + إشعار + بانر
// ════════════════════════════════════════════════════
function playProfitSound() {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    [523, 659, 784, 1047].forEach((freq, i) => {
      const osc = ctx.createOscillator(), gain = ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      osc.type = 'sine'; osc.frequency.value = freq;
      const t = ctx.currentTime + i * 0.13;
      gain.gain.setValueAtTime(0, t);
      gain.gain.linearRampToValueAtTime(0.35, t + 0.04);
      gain.gain.exponentialRampToValueAtTime(0.001, t + 0.45);
      osc.start(t); osc.stop(t + 0.5);
    });
  } catch(e) {}
}

function sendNotification(title, body) {
  if (!('Notification' in window)) return;
  const go = () => { try { new Notification(title, { body }); } catch(e) {} };
  if (Notification.permission === 'granted') go();
  else if (Notification.permission !== 'denied')
    Notification.requestPermission().then(p => { if (p === 'granted') go(); });
}

function checkProfitAlert(totalPnl, alertAt, egpRate, alertFired) {
  if (!alertAt || alertAt <= 0) return;
  const level = Math.floor(totalPnl / alertAt);
  if (level <= 0) return;
  const key = 'lv' + level;
  if (alertFired[key]) return;
  alertFired[key] = true;

  const earned    = (level * alertAt).toFixed(0);
  const earnedEGP = (level * alertAt * egpRate).toFixed(0);

  playProfitSound();
  showToast('🎉 ربحت $' + earned + ' — ' + Number(earnedEGP).toLocaleString() + ' جنيه!', 'gold');
  sendNotification('💰 تهانينا!', 'محفظتك ربحت $' + earned + ' 🚀');

  // بانر
  const old = document.getElementById('profitBanner');
  if (old) old.remove();
  const b = document.createElement('div');
  b.id = 'profitBanner'; b.className = 'profit-alert-banner';
  b.innerHTML = `
    <div class="alert-icon">🎉</div>
    <div style="flex:1">
      <div class="alert-text-big">مبروك! ربحت $${earned}</div>
      <div class="alert-text-sub">≈ ${Number(earnedEGP).toLocaleString()} جنيه — استمر! 🚀</div>
    </div>
    <div class="alert-close" onclick="this.parentElement.remove()">✕</div>`;
  const sc = document.getElementById('mainScreen');
  const rs = sc.querySelector('.rate-strip');
  if (rs) rs.insertAdjacentElement('afterend', b);
  else sc.prepend(b);
  setTimeout(() => { if (b.parentElement) b.remove(); }, 12000);
}

// ════════════════════════════════════════════════════
//  AI ANALYSIS
// ════════════════════════════════════════════════════
async function runAIAnalysis(coins, prices, changes, egpRate, selectedCoin) {
  const toAnalyze = selectedCoin ? coins.filter(c => c.id === selectedCoin) : coins;

  const portfolioData = toAnalyze.map(c => {
    const price  = prices[c.id] || null;
    const change = changes[c.id] ?? null;
    const val    = price ? price * c.qty : null;
    const cost   = c.avgBuy * c.qty;
    const pnl    = val != null ? val - cost : null;
    const pnlPct = val != null && cost ? ((val - cost) / cost * 100) : null;
    return {
      symbol: c.sym, coinId: c.id,
      currentPrice: price, avgBuyPrice: c.avgBuy, quantity: c.qty,
      valueUSD: val != null ? +val.toFixed(2) : null,
      costUSD: +cost.toFixed(2),
      pnlUSD: pnl != null ? +pnl.toFixed(2) : null,
      pnlPercent: pnlPct != null ? +pnlPct.toFixed(2) : null,
      pnlEGP: pnl != null ? +(pnl * egpRate).toFixed(0) : null,
      change24h: change,
    };
  });

  const systemPrompt = `أنت "أستاذ كريبتو". قواعد صارمة جداً:
١- تتكلم عامية مصرية 100% في كل كلمة — ممنوع أي إنجليزي في الشرح إطلاقاً.
٢- ممنوع تكتب أي جملة بالإنجليزي زي "Price is below SMA" أو "RSI is low" — قول ده بالعربي المصري.
٣- لازم تشرح إيه اللي بيحصل في السوق، وضع المستخدم، وتوصيتك — كلها بالعامية المصرية.
٤- ابعت JSON فقط بدون أي نص تاني.`;

  const userPrompt = `بيانات محفظة المستخدم على OKX:
${JSON.stringify(portfolioData, null, 2)}

سعر الدولار: ${egpRate} جنيه مصري

== مطلوب منك ==
• لو currentPrice موجود → استخدمه.
• لو currentPrice = null → حلل بمعرفتك بالعملة ولا تقول "مش عارف" أبداً.
• لكل عملة اشرح بالعامية المصرية: (١) إيه اللي بيحصل في السوق دلوقتي (٢) وضع المستخدم بالأرقام بالجنيه (٣) توصيتك الصريحة.

ابعت JSON بالشكل ده بالظبط:
{
  "signals": [
    {
      "coinId": "BTC-USDT",
      "sym": "BTC",
      "decision": "buy",
      "strength": "قوي",
      "confidence": 80,
      "reason": "مثال: البيتكوين دلوقتي بيتحرك في منطقة تراكم قوية وكسر مستوى مقاومة مهم. إنت شايل من 62 ألف يعني لو وصل 70 ألف هتكسب حوالي 3200 جنيه تقريباً. توصيتي استنى تأكيد الكسر وبعدين اشتري.",
      "entry": "63000",
      "tp1": "68000",
      "tp2": "75000",
      "sl": "59000"
    }
  ]
}

تذكر: عامية مصرية 100% — ممنوع إنجليزي في reason — ٣ جمل على الأقل — JSON فقط`;

  const resp = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      model: 'claude-sonnet-4-20250514',
      max_tokens: 2000,
      system: systemPrompt,
      messages: [{ role: 'user', content: userPrompt }]
    })
  });
  const data = await resp.json();
  const text = (data.content || []).map(b => b.text || '').join('');
  const match = text.match(/\{[\s\S]*\}/);
  if (!match) throw new Error('الرد مش JSON صحيح');
  return JSON.parse(match[0]);
}
