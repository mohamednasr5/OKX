<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="OKX Tracker">
<meta name="theme-color" content="#05080f">
<meta name="description" content="متابعة محفظة العملات الرقمية مع إشارات AI بالعامية المصرية">
<title>OKX Tracker — م. محمد حماد</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;900&family=JetBrains+Mono:wght@400;500;600;700&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════════════════════════
   DESIGN SYSTEM
═══════════════════════════════════════════════════════════ */
:root {
  --ink:    #05080f; --ink2:   #080c17;
  --panel:  #0a1020; --card:   #0d1628; --card2:  #111e36;
  --edge:   #162040; --edge2:  #1c2a50;
  --teal:   #00e5b8; --blue:   #0088ff;
  --violet: #7c3aed; --gold:   #f59e0b; --amber:  #fb923c;
  --profit: #10b981; --loss:   #ef4444; --warn:   #f59e0b;
  --t1: #e8f0ff; --t2: #7090b8; --t3: #3a5070; --t4: #1e3050;
  --r1: 4px; --r2: 8px; --r3: 14px; --r4: 20px;
  --shadow-teal:  0 0 30px rgba(0,229,184,.12);
  --shadow-card:  0 4px 24px rgba(0,0,0,.45);
  --shadow-deep:  0 12px 60px rgba(0,0,0,.7);
  --sidebar-w: 64px; --header-h:  54px; --mbar-h:    68px; --tabbar-h:  60px;
  --safe-top:    env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}

/* ─── RESET ─── */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; -webkit-touch-callout: none; }
html { height: 100%; height: -webkit-fill-available; font-size: 16px; }
body { height: 100%; height: -webkit-fill-available; width: 100%; background: var(--ink); color: var(--t1); font-family: 'Tajawal', sans-serif; overflow: hidden; user-select: none; -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; overscroll-behavior: none; -webkit-overflow-scrolling: touch; }

/* ─── BACKGROUND ─── */
#bgCanvas { position: fixed; inset: 0; z-index: 0; pointer-events: none; opacity: .45; }
body::before { content: ''; position: fixed; inset: 0; z-index: 1; background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.4'/%3E%3C/svg%3E"); opacity: .02; pointer-events: none; }

#app { position: relative; z-index: 2; display: flex; flex-direction: column; height: 100vh; height: 100dvh; height: -webkit-fill-available; overflow: hidden; }

/* ════ HEADER ════ */
.header { flex-shrink: 0; display: flex; align-items: center; justify-content: space-between; padding: 0 14px; padding-top: var(--safe-top); height: calc(var(--header-h) + var(--safe-top)); min-height: calc(var(--header-h) + var(--safe-top)); background: rgba(5,8,15,.97); border-bottom: 1px solid var(--edge); position: relative; z-index: 100; backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); }
.header::after { content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 1px; background: linear-gradient(90deg, transparent, var(--teal) 30%, var(--blue) 70%, transparent); opacity: .5; }
.logo { display: flex; align-items: center; gap: 9px; text-decoration: none; min-width: 0; }
.logo-mark { width: 32px; height: 32px; flex-shrink: 0; background: linear-gradient(135deg, var(--teal), var(--blue)); border-radius: var(--r2); display: flex; align-items: center; justify-content: center; font-family: 'Orbitron', monospace; font-size: 11px; font-weight: 900; color: #000; letter-spacing: -1px; box-shadow: var(--shadow-teal); position: relative; overflow: hidden; }
.logo-mark::before { content: ''; position: absolute; inset: 0; background: linear-gradient(135deg, rgba(255,255,255,.25), transparent); }
.logo-mark-inner { position: relative; z-index: 1; }
.logo-text { line-height: 1; min-width: 0; overflow: hidden; }
.logo-name { font-family: 'Orbitron', monospace; font-size: 13px; font-weight: 700; background: linear-gradient(135deg, var(--teal), var(--blue)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; letter-spacing: .5px; white-space: nowrap; }
.logo-sub { font-size: 9px; color: var(--t3); margin-top: 1px; font-weight: 400; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.live-pill { display: flex; align-items: center; gap: 5px; background: rgba(16,185,129,.08); border: 1px solid rgba(16,185,129,.2); border-radius: var(--r4); padding: 3px 9px; font-size: 9px; font-weight: 700; color: var(--profit); letter-spacing: .5px; flex-shrink: 0; }
.pdot { width: 5px; height: 5px; border-radius: 50%; background: var(--profit); animation: pdot 1.6s ease-in-out infinite; box-shadow: 0 0 6px var(--profit); }
@keyframes pdot { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: .3; transform: scale(.5); } }
.header-actions { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }
.h-btn { width: 34px; height: 34px; background: var(--card); border: 1px solid var(--edge); border-radius: var(--r2); display: flex; align-items: center; justify-content: center; font-size: 14px; cursor: pointer; color: var(--t2); text-decoration: none; transition: all .2s; position: relative; touch-action: manipulation; }
.h-btn:active { background: var(--card2); border-color: var(--teal); color: var(--teal); transform: scale(0.95); }
.h-btn.fb { background: rgba(24,119,242,.1); border-color: rgba(24,119,242,.25); color: #4a90e2; }
#dbDot { position: absolute; top: 4px; right: 4px; width: 6px; height: 6px; border-radius: 50%; background: var(--t3); transition: background .4s; }
#dbDot.connected { background: var(--profit); box-shadow: 0 0 6px var(--profit); }
#dbDot.error { background: var(--loss); }

/* ════ QUICK PANEL ════ */
.qp-wrap { flex-shrink: 0; background: rgba(8,12,23,.98); border-bottom: 1px solid var(--edge); position: relative; z-index: 80; }
.qp-bar { height: 36px; display: flex; align-items: center; justify-content: space-between; padding: 0 14px; cursor: pointer; touch-action: manipulation; }
.qp-bar:active { background: rgba(255,255,255,.018); }
.qp-pills { display: flex; align-items: center; gap: 8px; overflow: hidden; }
.qp-chip { display: flex; align-items: center; gap: 4px; font-size: 10px; font-family: 'JetBrains Mono', monospace; flex-shrink: 0; }
.qp-chip-label { color: var(--t3); font-family: 'Tajawal', sans-serif; font-size: 9px; }
.qp-chip-val { font-weight: 600; font-size: 11px; }
.qp-chip-val.gold { color: var(--gold); } .qp-chip-val.profit { color: var(--profit); } .qp-chip-val.loss { color: var(--loss); }
.qp-divider { width: 1px; height: 14px; background: var(--edge2); flex-shrink: 0; }
.qp-chevron { width: 22px; height: 22px; border-radius: var(--r1); display: flex; align-items: center; justify-content: center; font-size: 9px; color: var(--t3); transition: transform .3s cubic-bezier(.34,1.2,.64,1); flex-shrink: 0; }
.qp-chevron.open { transform: rotate(180deg); color: var(--teal); }
.qp-body { overflow: hidden; max-height: 0; transition: max-height .32s cubic-bezier(.4,0,.2,1), opacity .25s; opacity: 0; }
.qp-body.open { max-height: 200px; opacity: 1; }
.qp-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 10px 14px 12px; border-top: 1px solid var(--edge); }
.qp-field { display: flex; flex-direction: column; gap: 4px; }
.qp-field-label { font-size: 8px; font-weight: 700; color: var(--t3); text-transform: uppercase; letter-spacing: .7px; }
.qp-input-wrap { display: flex; align-items: center; background: var(--card); border: 1px solid var(--edge); border-radius: var(--r2); overflow: hidden; transition: border-color .2s, box-shadow .2s; }
.qp-input-wrap:focus-within { border-color: var(--teal); box-shadow: 0 0 0 3px rgba(0,229,184,.1); }
.qp-prefix { padding: 0 9px; font-size: 11px; color: var(--t3); font-family: 'JetBrains Mono', monospace; font-weight: 600; border-left: 1px solid var(--edge); }
.qp-input { flex: 1; min-width: 0; background: transparent; border: none; outline: none; color: var(--t1); font-family: 'JetBrains Mono', monospace; font-size: 15px; padding: 8px 10px 8px 6px; direction: ltr; -webkit-appearance: none; border-radius: 0; }
.qp-hint { font-size: 8px; color: var(--t3); line-height: 1.4; }
.qp-hint .hl { font-weight: 700; } .qp-hint .hl.profit { color: var(--profit); } .qp-hint .hl.gold { color: var(--gold); }
.qp-save-btn { grid-column: 1 / -1; background: linear-gradient(135deg, var(--teal) 0%, var(--blue) 100%); color: #000; border: none; border-radius: var(--r2); padding: 10px; font-size: 13px; font-weight: 900; cursor: pointer; font-family: 'Tajawal', sans-serif; transition: opacity .18s, transform .18s; letter-spacing: .3px; touch-action: manipulation; min-height: 44px; }
.qp-save-btn:active { opacity: .88; transform: scale(0.98); }

/* ════ MARKET BAR ════ */
.market-bar { flex-shrink: 0; background: var(--panel); border-top: 1px solid var(--edge); position: relative; z-index: 90; display: flex; flex-direction: column; overflow: hidden; padding-bottom: 0; }
.market-bar::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px; background: linear-gradient(90deg, transparent, var(--blue) 30%, var(--teal) 70%, transparent); opacity: .6; }
.mbar-label { display: flex; align-items: center; gap: 5px; padding: 4px 12px 2px; font-size: 7.5px; font-weight: 700; color: var(--t3); text-transform: uppercase; letter-spacing: 1px; flex-shrink: 0; }
.market-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1px; background: var(--edge); overflow: hidden; }
.mi { background: var(--panel); display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 5px 2px; gap: 1px; cursor: default; position: relative; overflow: hidden; }
.mi::before { content: ''; position: absolute; inset: 0; background: linear-gradient(135deg, rgba(255,255,255,.025), transparent 60%); pointer-events: none; }
.mi.up-flash { animation: mfUp .7s ease; } .mi.dn-flash { animation: mfDn .7s ease; }
@keyframes mfUp { 0%, 100% { background: var(--panel); } 40% { background: rgba(16,185,129,.16); } }
@keyframes mfDn { 0%, 100% { background: var(--panel); } 40% { background: rgba(239,68,68,.12); } }
.mi-sym { font-size: 7.5px; font-weight: 900; color: var(--t3); font-family: 'Orbitron', monospace; letter-spacing: .5px; text-transform: uppercase; }
.mi-price { font-size: 11px; font-weight: 600; font-family: 'JetBrains Mono', monospace; line-height: 1; }
.mi-price.up { color: var(--profit); } .mi-price.dn { color: var(--loss); } .mi-price.nc { color: var(--t2); }
.mi-chg { font-size: 8px; font-weight: 700; font-family: 'JetBrains Mono', monospace; padding: 1px 4px; border-radius: 3px; }
.mi-chg.up { background: rgba(16,185,129,.12); color: var(--profit); }
.mi-chg.dn { background: rgba(239,68,68,.1); color: var(--loss); }
.mi-chg.nc { color: var(--t3); }

/* ════ BOTTOM TAB BAR ════ */
.tabbar { flex-shrink: 0; display: flex; background: rgba(5,8,15,.98); border-top: 1px solid var(--edge); position: relative; z-index: 100; padding-bottom: var(--safe-bottom); height: calc(var(--tabbar-h) + var(--safe-bottom)); }
.tabbar::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px; background: linear-gradient(90deg, transparent, var(--teal) 30%, var(--blue) 70%, transparent); opacity: .4; }
.tab { flex: 1; height: var(--tabbar-h); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px; font-size: 10px; font-weight: 700; color: var(--t3); background: none; border: none; cursor: pointer; font-family: 'Tajawal', sans-serif; transition: color .2s; touch-action: manipulation; position: relative; min-width: 0; padding: 0; }
.tab::after { content: ''; position: absolute; top: 0; left: 20%; right: 20%; height: 2px; border-radius: 0 0 3px 3px; background: linear-gradient(90deg, var(--teal), var(--blue)); transform: scaleX(0); transition: transform .25s cubic-bezier(.34,1.4,.64,1); }
.tab.active { color: var(--teal); } .tab.active::after { transform: scaleX(1); }
.tab:active:not(.active) { color: var(--t2); }
.tab-icon { font-size: 20px; line-height: 1; } .tab-label { font-size: 10px; white-space: nowrap; }

/* ════ CONTENT AREA ════ */
.content-wrapper { flex: 1; display: flex; flex-direction: column; overflow: hidden; min-height: 0; }
#mainScreen { flex: 1; overflow-y: auto; overflow-x: hidden; -webkit-overflow-scrolling: touch; overscroll-behavior-y: contain; padding: 12px 12px 16px; display: flex; flex-direction: column; gap: 11px; position: relative; z-index: 10; }
#mainScreen::-webkit-scrollbar { display: none; }
.footer { display: none; }

/* ════ PROFIT BANNER ════ */
.profit-alert-banner { display: flex; align-items: center; gap: 12px; background: linear-gradient(135deg, rgba(16,185,129,.13), rgba(0,229,184,.05)); border: 1px solid rgba(16,185,129,.3); border-radius: var(--r3); padding: 12px 14px; position: relative; overflow: hidden; animation: bannerPop .5s cubic-bezier(.34,1.56,.64,1) both; }
@keyframes bannerPop { from { transform: scale(.9) translateY(-12px); opacity: 0; } to { transform: scale(1) translateY(0); opacity: 1; } }
.profit-alert-banner::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; background: linear-gradient(90deg, var(--profit), var(--teal)); animation: scanH 2.5s linear infinite; }
@keyframes scanH { from { transform: translateX(-100%); } to { transform: translateX(100%); } }
.alert-icon { font-size: 22px; animation: alertBounce 1s ease infinite; }
@keyframes alertBounce { 0%, 100% { transform: translateY(0) rotate(0); } 40% { transform: translateY(-5px) rotate(8deg); } }
.alert-text-big { font-size: 14px; font-weight: 900; color: var(--profit); }
.alert-text-sub { font-size: 11px; color: var(--t2); margin-top: 2px; }
.alert-close { position: absolute; top: 8px; left: 10px; font-size: 14px; color: var(--t3); cursor: pointer; width: 28px; height: 28px; display: flex; align-items: center; justify-content: center; border-radius: 50%; touch-action: manipulation; }

/* ════ SUMMARY CARD ════ */
.summary-card { background: linear-gradient(145deg, #0c1c36 0%, #091526 100%); border: 1px solid var(--edge); border-radius: var(--r3); padding: 16px; position: relative; overflow: hidden; animation: slideUp .45s cubic-bezier(.34,1.2,.64,1) both; }
@keyframes slideUp { from { opacity: 0; transform: translateY(18px) scale(.97); } to { opacity: 1; transform: translateY(0) scale(1); } }
.summary-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; background: linear-gradient(90deg, var(--teal), var(--blue), var(--violet)); }
.summary-card::after { content: ''; position: absolute; top: -50px; right: -50px; width: 140px; height: 140px; background: radial-gradient(circle, rgba(0,229,184,.07) 0%, transparent 70%); pointer-events: none; animation: orbFloat 6s ease-in-out infinite alternate; }
@keyframes orbFloat { from { opacity: .4; transform: scale(1); } to { opacity: 1; transform: scale(1.5); } }
.summary-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 14px; }
.summary-label { font-size: 10px; color: var(--t3); text-transform: uppercase; letter-spacing: 1.2px; font-weight: 500; }
.total-value { font-family: 'JetBrains Mono', monospace; font-size: 28px; font-weight: 700; line-height: 1.1; margin-top: 4px; }
.total-egp { font-size: 11px; color: var(--t2); margin-top: 3px; font-family: 'JetBrains Mono', monospace; }
.pnl-badge { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; }
.pnl-pct-big { font-size: 20px; font-weight: 900; font-family: 'JetBrains Mono', monospace; padding: 4px 11px; border-radius: 10px; position: relative; overflow: hidden; }
.pnl-pct-big.profit { background: rgba(16,185,129,.12); color: var(--profit); border: 1px solid rgba(16,185,129,.2); }
.pnl-pct-big.loss { background: rgba(239,68,68,.1); color: var(--loss); border: 1px solid rgba(239,68,68,.18); }
.pnl-abs { font-size: 10px; color: var(--t2); font-family: 'JetBrains Mono', monospace; }
.summary-stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 7px; margin-top: 4px; }
.stat-box { background: rgba(255,255,255,.022); border: 1px solid rgba(255,255,255,.04); border-radius: var(--r2); padding: 8px; }
.stat-label { font-size: 9px; color: var(--t3); margin-bottom: 3px; }
.stat-val { font-size: 11px; font-weight: 700; font-family: 'JetBrains Mono', monospace; color: var(--t1); }
.stat-sub { font-size: 8px; color: var(--t3); margin-top: 2px; }

.section-title { display: flex; align-items: center; justify-content: space-between; padding: 0 2px; font-size: 9px; font-weight: 700; color: var(--t3); text-transform: uppercase; letter-spacing: 1.2px; }
.section-badge { background: var(--card2); border: 1px solid var(--edge2); border-radius: var(--r4); padding: 2px 8px; font-size: 9px; color: var(--t2); }

/* ════ PORTFOLIO LIST & ACCORDION ════ */
.portfolio-list {
  display: flex; flex-direction: column; gap: 11px;
}
.portfolio-list.has-expanded .coin-card {
  transition: opacity 0.35s ease, transform 0.35s ease, margin 0.35s cubic-bezier(.34,1.2,.64,1);
}
.portfolio-list.has-expanded .coin-card:not(.expanded) {
  opacity: 0.45; transform: scale(0.96);
}

.coin-card {
  background: var(--card); border: 1px solid var(--edge); border-radius: var(--r3);
  overflow: hidden; position: relative; cursor: pointer;
  animation: slideUp .4s cubic-bezier(.34,1.2,.64,1) both;
  -webkit-user-select: none;
  transition: all 0.25s ease;
}
.coin-card.profit { border-color: rgba(16,185,129,.22); }
.coin-card.loss   { border-color: rgba(239,68,68,.18); }

/* حالة البطاقة المفتوحة */
.coin-card.expanded {
  box-shadow: 0 0 25px rgba(0,229,184,.08);
  border-color: var(--teal); margin: 6px 0;
  background: linear-gradient(180deg, var(--card) 0%, #0a1120 100%);
}
.coin-card.expanded.profit { border-color: var(--profit); box-shadow: 0 0 25px rgba(16,185,129,.1); }
.coin-card.expanded.loss   { border-color: var(--loss); box-shadow: 0 0 25px rgba(239,68,68,.1); }

.coin-accent { position: absolute; right: 0; top: 0; bottom: 0; width: 3px; }
.coin-card.profit .coin-accent { background: linear-gradient(180deg, var(--profit), rgba(16,185,129,.2)); }
.coin-card.loss   .coin-accent { background: linear-gradient(180deg, var(--loss),   rgba(239,68,68,.2)); }

.coin-top { display: flex; align-items: center; justify-content: space-between; padding: 13px 15px 11px 12px; gap: 8px; }
.coin-left { display: flex; align-items: center; gap: 10px; min-width: 0; flex: 1; }
.coin-avatar { width: 40px; height: 40px; border-radius: 50%; flex-shrink: 0; background: linear-gradient(135deg, var(--card2), var(--edge)); border: 1px solid var(--edge2); display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 900; color: var(--teal); font-family: 'Orbitron', monospace; letter-spacing: -.5px; }
.coin-name { font-size: 16px; font-weight: 900; letter-spacing: .3px; }
.coin-pair { font-size: 10px; color: var(--t3); margin-top: 1px; }
.coin-change { font-size: 9.5px; font-weight: 700; padding: 2px 6px; border-radius: 5px; margin-top: 3px; display: inline-block; font-family: 'JetBrains Mono', monospace; }
.coin-change.profit { background: rgba(16,185,129,.1); color: var(--profit); }
.coin-change.loss { background: rgba(239,68,68,.1); color: var(--loss); }

.coin-right { text-align: left; flex-shrink: 0; }
.coin-price { font-family: 'JetBrains Mono', monospace; font-size: 17px; font-weight: 700; }
.coin-price.profit { color: var(--profit); } .coin-price.loss { color: var(--loss); }
.coin-price-egp { font-size: 9px; color: var(--t3); margin-top: 2px; direction: ltr; }
.coin-ai-signal { font-size: 9px; margin-top: 3px; direction: ltr; }

.coin-stats { display: grid; grid-template-columns: 1fr 1fr 1fr; background: rgba(0,0,0,.22); border-top: 1px solid rgba(255,255,255,.04); padding: 8px 12px; }
.coin-stat-label { font-size: 8.5px; color: var(--t3); margin-bottom: 2px; }
.coin-stat-val { font-size: 11px; font-weight: 700; font-family: 'JetBrains Mono', monospace; color: var(--t2); }

.coin-pnl-row { display: flex; align-items: center; justify-content: space-between; padding: 9px 12px 11px; border-top: 1px solid rgba(255,255,255,.04); }
.pnl-usd { font-size: 16px; font-weight: 900; font-family: 'JetBrains Mono', monospace; }
.pnl-usd.profit { color: var(--profit); } .pnl-usd.loss { color: var(--loss); }
.pnl-egp-sub { font-size: 9px; color: var(--t3); margin-top: 1px; font-family: 'JetBrains Mono', monospace; }
.pnl-actions { display: flex; align-items: center; gap: 8px; }
.pnl-pct-badge { font-size: 11px; font-weight: 700; font-family: 'JetBrains Mono', monospace; padding: 4px 10px; border-radius: 6px; }
.pnl-pct-badge.profit { background: rgba(16,185,129,.1); color: var(--profit); }
.pnl-pct-badge.loss { background: rgba(239,68,68,.09); color: var(--loss); }
.pnl-pct-badge.neutral{ color: var(--t3); }

<script>
(function(){
  const canvas = document.getElementById('bgCanvas');
  const ctx = canvas.getContext('2d');
  let W, H, particles = [], animId;
  function resize(){ W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
  function Particle(){ this.reset(); }
  Particle.prototype.reset = function(){ this.x = Math.random()*W; this.y = Math.random()*H; this.r = Math.random()*1.3+.3; this.vx = (Math.random()-.5)*.25; this.vy = (Math.random()-.5)*.25; this.life = Math.random(); this.color = Math.random()>.6?'#00e5b8':Math.random()>.5?'#0088ff':'#7c3aed'; this.alpha = Math.random()*.35+.08; };
  Particle.prototype.update = function(){ this.x+=this.vx; this.y+=this.vy; this.life-=.0015; if(this.life<=0||this.x<0||this.x>W||this.y<0||this.y>H) this.reset(); };
  Particle.prototype.draw = function(){ ctx.save(); ctx.globalAlpha = this.alpha*this.life*2.5; ctx.fillStyle = this.color; ctx.shadowColor = this.color; ctx.shadowBlur = 5; ctx.beginPath(); ctx.arc(this.x,this.y,this.r,0,Math.PI*2); ctx.fill(); ctx.restore(); };
  function init(){ resize(); const count = window.innerWidth<600?50:80; particles = Array.from({length:count}, ()=>new Particle()); }
  function loop(){ ctx.clearRect(0,0,W,H); for(let i=0;i<particles.length;i++){ for(let j=i+1;j<particles.length;j++){ const dx=particles[i].x-particles[j].x; const dy=particles[i].y-particles[j].y; const dist=Math.sqrt(dx*dx+dy*dy); if(dist<100){ ctx.save(); ctx.globalAlpha=(1-dist/100)*0.05; ctx.strokeStyle='#00e5b8'; ctx.lineWidth=.4; ctx.beginPath(); ctx.moveTo(particles[i].x,particles[i].y); ctx.lineTo(particles[j].x,particles[j].y); ctx.stroke(); ctx.restore(); } } } particles.forEach(p=>{ p.update(); p.draw(); }); animId = requestAnimationFrame(loop); }
  init(); loop();
  let resizeTimer; window.addEventListener('resize', ()=>{ clearTimeout(resizeTimer); resizeTimer = setTimeout(()=>{ cancelAnimationFrame(animId); init(); loop(); }, 200); });
  document.addEventListener('visibilitychange', ()=>{ if(document.hidden){ cancelAnimationFrame(animId); }else{ loop(); } });
})();
</script>
